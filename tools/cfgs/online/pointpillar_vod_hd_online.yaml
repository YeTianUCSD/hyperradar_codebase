# Online HD adaptation config for HyperRadar PointPillar (VoD radar)
#
# NOTE:
# - This file is intentionally independent from train/test cfgs.
# - Keys in `ONLINE` map 1:1 to tools/modules/online_hd_runner.py:OnlineHDConfig.
# - main_online_hd.py currently accepts these as CLI args; this file serves as
#   a canonical preset for reproducible runs.

ONLINE:
  # -----------------------------
  # Pseudo-label selection
  # -----------------------------
  tau_prob: 0.40
  tau_margin: 0.08
  min_tau_prob: 0.15
  min_tau_margin: 0.01

  # Adaptive top-k selector on candidate anchors
  select_top_ratio: 0.005
  select_min_k: 64
  select_max_k: 256

  # Teacher-student consistency shaping
  consistency_bonus: 0.10
  inconsistency_penalty: 0.05

  # -----------------------------
  # Teacher memory EMA
  # -----------------------------
  use_teacher: true
  teacher_momentum: 0.995

  # -----------------------------
  # Update trigger
  # -----------------------------
  # Runner attempts update every N stream steps.
  update_every_n_steps: 32
  # Require enough selected/confident anchors before applying update.
  min_selected_anchors: 1024
  min_confpass_anchors: 256

  # -----------------------------
  # Update behavior
  # -----------------------------
  # train: prototype add-only
  # retrain: perceptron correction on wrong predictions
  # both: train + retrain
  update_mode: train
  alpha: 0.005

  # Pull updated memory slightly back to source prototypes each update.
  source_pullback_lambda: 0.02

  # Per-step class cap (<=0 means no cap)
  max_per_class_per_step: 0
  # Class considered effectively updated only if touched this many times.
  min_per_class_for_update: 64
  # Class-balance gate:
  #   enable=true  -> accumulate pending buffer until class support is enough.
  #   min_classes_to_update<=0 -> require all classes.
  class_balance_enable: true
  class_balance_min_classes_to_update: 2
  # Disable forced updates when classes are imbalanced; skip updates instead.
  class_balance_max_pending_steps: 0

  # -----------------------------
  # Replay memory
  # -----------------------------
  replay_enable: false
  replay_cap_per_class: 256
  replay_per_class: 32
  replay_alpha_scale: 0.5

  # -----------------------------
  # Guard / rollback
  # -----------------------------
  eval_every_updates: 1
  guard_max_drop: 0.01
  guard_use_best: true

  # -----------------------------
  # Logging / checkpointing
  # -----------------------------
  save_every_updates: 5
  log_interval_steps: 10

  # -----------------------------
  # Feature and logit source
  # -----------------------------
  # feat_source:
  #   cls -> use batch_dict['hd_cls_feat']
  #   bev -> use batch_dict['spatial_features_2d']
  feat_source: cls

  # pseudo logits for selection:
  #   final | origin | hd
  pseudo_logits_source: origin

  # -----------------------------
  # Threshold relaxation if no anchors selected
  # -----------------------------
  zero_update_tau_prob_step: 0.02
  zero_update_tau_margin_step: 0.005
